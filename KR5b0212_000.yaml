body:
  text: 祝香此香乾坤育質日月凝華抱生成之數於五行騰馥郁之馨於百和諸天稱慶萬聖臨軒爇向爐中供養至真無上道寶玄都萬壽天尊以此爇香功德端為上祝皇圖鞏固聖壽無疆欽願北極齊年南山等壽箕畢上符於王曆華夷永被於淳風此香天靈發頴月窟蟠根磅礴九霄可以返魂致魄周流八極得之起死回生爇向瀘中供養至真無上經寶太一救苦天尊以此爇香功德超度齋壇所薦亡過某靈魂洎附薦衆魂盡脫重隂之府俱登長樂之鄉福被見存慶流後裔此香靈煙結乎五嶽瑞氣蓊乎九垓為道德香遍清靜境爇向爐中供養至真無上師寶十方救苦天尊以此爇香功德拔度三塗六趣十宫九幽沉迷利害之魂流浪死生之識哀哀長夜汨汨幽𡍼咸承三寶之惠光悉仗慈尊之願力脫離垢濁俱證清虛按人各恭信三歸依敷座讃伏以妙道難名洪恩普度德顯大慈之號位居東極之尊灑甘露而熱惱清涼散惠光而幽明洞照無所化而不化在處應身因以機而顯機利生接物定而善應慈以玄通一體同觀普天均被説經教化形於十方救苦魂超度於三界息七趣六情之痛楚停三塗九夜之辛酸委氣聚功享天堂之大福隨機赴感絶地獄之苦聲接引羣迷宏開衆妙提携庶類俱入大乘以今奉為齋主某資薦六過某靈魂修崇妙範恭啓蘭場科宣三洞之洪儀經轉十天之寶藴冀玄穹之垂鑑度魂爽以超升俾亡過某諦聽真詮頓脫離於苦趣躬承惠澤獲造迹於仙階旁及幽扄羈執之徒悉濟身後𡨚仇之衆俱沾曠蕩盡出輪回兹請同盟之士各運入室之誠潔志澄心端身正念一依經法次第宣行入壇至東方跪奏具位誠惶誠恐稽首頓首再拜奏啓東方玉寶皇上天尊東鄉救苦真人童子無鞅真衆恭望聖慈俯垂洞鑒伏以尊居震位有生咸賴於陶鎔春動陽和無物不資於造化金丹初轉木德敷榮敢祈告命於靈司是用頒符於曲府匪慿洪造難格玄恩伏望緑輦丹輿來鑑十真之會琅函寶笈周圎一遍之功臣干冒聖威下情無任懇祈之至法衆虔誠謹伸奉請請聖散花宿命讃升座演第一遍經伏聞香林苑內常宣救苦之經東極宫中廣運博施之德號大慈仁者稱救苦天尊應念垂慈尋聲赴感發弘誓願救度衆生盡億劫以來廣度人無量以今升座異口同音諷誦妙經稱揚睿號奉為齋主資薦靈魂仗良因之妙力消億劫之愆瑕免歷東方考對之司徑詣清靜無極之國法衆虔誠同聲諷誦經畢再至東方具位啓聖伏以應感分輝如滿十方之界尋聲救苦願宏億劫之中仰冀垂慈敢忘皈命見前清衆異口同音諷詠妙經稱揚睿號巳周一遍奉為齋主薦悼亡魂往生仙界伏願假威神之妙力拔罪苦之迷途出東方冥昧之鄉登慧靜華林之境所有太上真符謹當宣告宣符疏關送聖南方跪奏具位誠惶誠恐稽首頓首再拜奏啓南方玄真萬福天尊南鄉救苦真人童子無鞅真衆恭望聖慈俯回洞鑑伏以德輝離位光明洞照於邇遐化闡南閻神造陶鎔於溟漠兩轉爐中之大藥再全地下之枯骸敢祈告命於靈司是用頒符於曲府匪慿洪造難格玄恩伏望緑輦丹舉來鑑十真之會琅函寶笈周圎二遍之功臣于冒聖威下情無任懇禱之至法衆虔誠謹伸奉請請聖散花升座演第二遍經伏聞元始上帝昔在香林苑內宣告法解真人讃嘆大慈仁者謂欲九幽亡殁超度必當一念注想稱揚願宏當時度品之功俯鑑此際皈依之志以今升入經座異口同音諷詠妙經稱揚睿號奉為齋主某資薦亡過某靈魂仗良因之妙力消億劫之愆尤免歷南方考對之司徑詣真老無極之國法衆虔誠同聲諷誦經畢再至南方具位啓聖伏以天氣歸身感自然之别體塵沙示現顯變化之殊因功德難量皈依至切見前清衆異口同音諷誦真經稱揚睿號已周二遍奉為齋主某薦授亡魂往生仙界伏願承赫奕之靈光度魂儀於丹界不拘逼合永超南方冥昧之鄉早證逍遙徑上端化莊嚴之境所有太上真符謹當宣告宣符疏關送聖西方跪奏具位誠惶誠恐稽首頓首再拜奏啓西方太妙至極天尊西鄉救苦真人童子無鞅真衆恭望聖慈俯垂洞鑒伏以兊澤潛流金天乘運説兹萬法協和覆載之機應彼四時啓迪生成之化羣生蒙惠三遍説經敢祈告命於靈司是用頒符於曲府匪慿洪造難格玄恩伏望緑輦丹輿來鑑十真之會琅函寶笈周圎三遍之功臣干冒天威下情無任懇禱之至法衆虔誠謹伸奉請請聖散花升座演第三遍伏聞救苦真詮功遍覃於九地慈尊寶號恩普及於十方拔領無邊讃揚莫盡以今升入經座異口同音諷誦真經稱揚睿號奉為齋主資薦靈魂往生仙界仗良因之妙力消億劫之愆瑕免歷西方考對之司徑詣法寶無極之國法衆虔誠同聲諷誦經畢再至西方具位啓聖伏以拔領無邊散祥煙而塞死戶超度三界擁慶雲而開生門仰聖化之巍巍罄丹誠之切切見前清衆異口同音諷詠真經稱揚睿號巳周三遍奉為齋主薦悼亡魂往生仙界伏願天光下燭惠澤滂沾出離西方冥昧之鄉升舉利益莊嚴之國所有太上真符謹當宣告宣符疏關送聖北方跪奏具位誠惶誠恐稽首頓首再拜奏啓北方玄上玉晨天尊北鄉救苦真人童子元鞅真衆恭望聖慈俯回洞鑑伏以啓至隂而肇運習盛德於坎宫萬物得以歸休羣生資而靜息説經四遍敷澤羣黎敢祈告命於靈司是用頒符於曲府匪慿洪造難格玄恩伏望緑輦丹輿來鑑十真之會琅函寶笈周圎四遍之功臣干冒聖威下情無任懇禱之至法衆虔誠謹伸奉請請聖散花升座演第四遍伏聞大洞妙經普救無邊之苦衆青玄上帝常垂不倦之慈悲恩被羣生願弘浩劫以今升入經座異口同音諷誦妙經稱揚睿號奉為齋主資薦亡魂仗良因之妙力消億劫之愆瑕免歷北方考對之司徑詣救苦無極之國法衆虔誠同聲諷誦經畢再詣北方具位啓聖伏以體皆虛空資混元而成立氣能委順備萬物以光明凡有皈投必垂開度見前清衆異口同音誦詠妙經稱揚睿號已周四遍奉為齋主資悼魂儀往生仙界伏願滅身心口業生智惠光明悉超北方冥昧之鄉徑上定真快樂之境所有太上真符謹當宣告宣符疏關送聖東北方跪奏具位誠惶誠恐稽首頓首再拜奏啓東北方度仙上聖天尊東北鄉救苦真人童子無鞅真衆恭望聖慈俯垂洞鑑伏以大象胚腪凝一氣以舍韞重玄化作分八索以恢張乾道流行艮山列位欲羣生而蒙福兹五遍以説經敢祈告命於靈司是用頒符於曲府匪慿洪造難格玄恩伏望緑輦丹輿來鑑十真之會琅函寶笈周圎五遍之功臣干冒聖威下情無任懇禱之至法衆虔誠謹仲奉請請聖散花升座演第五遍伏聞太一慈尊端拱青玄之左府洞玄妙藴普救黑壤之沉魂几有歸崇必蒙濟度以今升入經座異口同音誦詠妙經稱揚睿號奏為齋主資薦亡魂仗良因之妙力消億劫之愆瑕免歷東北方考對之司徑詣妙因無極之國法衆虔誠同聲諷誦經畢再詣東北方具位啓聖伏以渺渺仙源肇布一元之氣巍巍大範旁昭三洞之文特伸忱悃之私願賜慈悲之澤見前清衆異口同音誦詠妙經稱揚睿號巳周五遍奉為齋主薦悼魂儀往生仙界伏願罪消黑簿名注丹書出東北方冥昧之鄉登長樂界蒼元之境所有太上真符謹當宣告宣符疏關送聖東南方跪奏具位誠惶誠恐稽首頓首再拜奏啓東南方好生度命天尊東南鄉救苦真人童子無鞅真衆恭望聖慈俯垂洞鑒伏以丹華闕下凝梵氣以為宫絳府庭中揚巽風而煦物百谷識朝中之所三山標靈化之竒浸德澤以無涯配真功而不宰説經六遍布化羣黎敢祈告命於靈司是用頒符於曲府匪憑洪造難格玄恩伏望緑輦丹輿來鑑十真之會琅函寶笈周圎六遍之功臣干冒聖威下情無任懇禱之至法衆虔誠謹伸奉請請聖散花升座演第六遍伏聞巍巍大範仰束極之慈悲蕩蕩自然賴洞玄之靈藴莫窮稱讃惟切皈依以今升入經座異口同音誦詠妙經稱揚睿號奉為齋主資薦靈魂仗良因之妙力消億劫之愆瑕免歷東南方考對之司徑詣真安無極之國法衆虔誠同聲諷誦經畢再詣東南方具位啓聖伏以紫雲密覆是名三寶之神尊梵氣彌羅以制九天之魂爽玄功莫測丹悃必從見前清衆異口同音誦詠妙經稱揚睿號巳周六遍奉為齋主資薦魂儀往生仙界伏願形神俱妙魂魄超升出東南方冥昧之鄉登妙寂界莊嚴之國所有太上真符謹當宣告宣符疏關送聖西南方跪奏具位誠惶誠恐稽首頓首再拜奏啓西南方太靈虛皇天尊西南鄉救苦真人童子無鞅真衆恭望聖慈俯垂洞鑒伏以二象分靈紐沉機於分野重隂定位凝至靜於坤輿載物稱雄承天立極經巳周於七遍澤廣被於羣生敢祈告命於靈司是用頒符於曲府匪慿洪造難格玄恩伏望緑輦丹輿來鑒十真之會琅函寶笈周圎七遍之切臣干冒聖威下情無任懇禱之至法衆虔誠謹伸奉請請聖散花升座演第七遍伏聞空中灼灼仰承大道之恩幽境冥冥實著慈悲之惠苦輪普救仙境俱登以今升入經座異口同音誦詠妙經稱揚睿號奉為齋主資薦靈魂往生仙界仗良因之妙力消億劫之愆瑕免歷西南方考對之司徑詣耀真無極之國法衆虔誠同聲諷誦經畢再詣西南方具位啓聖伏以靈篇朗誦獲心垢以俱清睿號稱揚舉耳根之益淨既無文而不度必有感以皆通見前清衆異口同音誦詠妙經巳周七遍奉為齋主資薦亡魂往生仙界伏願罪根蕩滌神識清涼出西南方冥昧之鄉登妙樂境莊嚴之國所有太上真符謹當宣告宣符疏關送聖西北方跪奏具位誠惶誠恐稽首頓首再拜奏啓西北方無量太華天尊西北鄉救苦真人童子無鞅真衆恭望聖慈俯垂洞鑒伏以混元踈朗廓玄象以傾光梵氣沖融鼓清風而立極均分寒暑主宰隂陽既司善惡之權須酌重輕之報説經八遍普澤羣生敢祈告命於靈司是用頒符於曲府匪慿洪造難格玄恩伏望緑輦丹輿來鑒十真之會琅函寶笈周圎八遍之功臣干冒聖威下情無任懇禱之至法衆虔誠謹伸奉請請聖散花升座演第八遍伏聞大道恩深宣真經而救苦幽途幸甚聞聖號以升遷志篤心崇力祈濟度以今升入經座異口同音誦詠妙經稱揚睿號奉為齋主資薦亡魂仗良因之妙力消億劫之愆瑕免歷西北方考對之司徑詣濟苦無極之國法衆虔誠同聲諷誦經畢再詣西北方具位啓聖伏以罪實可哀蒙道恩而濟度念無休息賴經法以生成既伸皈向之誠必沐超凌之澤見前清衆異口同音誦詠妙經已周八遍奉為濟主資薦亡魂往生仙界伏願蠲消宿業澄正魂神出西北冥昧之鄉登惠靜莊嚴之國所有太上真符謹當宣告宣符疏關送聖上方跪奏具位誠惶誠恐稽首頓首再拜奏啓上方玉虛明皇天尊上鄉救苦真人童子無鞅真衆恭望聖慈俯垂洞鑒伏以虛無妙境蕆大範之玄功碧落清風扇自然之洪運真功渺邈惠智難窮包括穹窿司張象緯既説經於九遍當普救於羣黎敢祈告命於靈司是用頒符於曲府匪慿洪造難格玄恩伏望緑輦丹輿來鑒十真之會琅函寶笈周圎九遍之功臣干冒聖威下情無任懇禱之至法衆虔誠謹伸奉請請聖散花升座演第九遍伏聞真詮流布示法炬於昏衢寶號稱揚運慈航於苦海人天普濟正道咸歸以今升入經座異口同音誦詠妙經稱揚睿號奉為齋主資薦亡魂仗良因之妙力消億劫之愆瑕免歷上方考對之司徑詣七寶紫霄之國法衆虔誠同聾諷誦經畢再詣上方具位啓聖伏以無名無我惟接引於羣生不迷不荒可悟成於真道萬劫莫測於微妙寸誠克遂於感通見前清衆異口同音誦詠妙經稱揚睿號巳周九遍奉為齋主資薦魂儀往生仙界伏願火翳成清署劒樹化為騫魂爽下離於幽都神識上升於碧落所有太上真符謹當宣告宣符疏關送聖下方跪奏具位誠惶誠恐稽首頓首再拜奏啓下方真皇洞神天尊下鄉救苦真人童子無鞅真衆恭望聖慈俯垂洞鑒伏以方輿載物弘大信以無私厚德安貞布洪基而永固咸資道力克運神功説經普救於九泉聽法巳周於十遍皆承功而受度今入聖以超凡敢祈告命於靈司是用頒符於曲府匪慿洪造難格玄恩伏望緑輦丹輿來鑒十真之會琅函寶笈周圎十遍之功臣干冒聖威下情無任懇禱之至法衆虔誠謹伸奉請請聖散花升座演第十遍伏聞東極慈父青玄老君沛法兩以潤衆生布慈雲而覆羣品恩沾九地澤被十方以今升入經座異口同音誦詠妙經稱揚睿號奉為齋主資薦亡魂仗良因之妙力消億劫之愆瑕免歷下方考對之司徑詣淨土莊嚴之國法衆虔誠同聲諷誦經畢再詣下方具位啓聖伏以至真蕆教道力遍周妙哉三洞之經至矣威神之力上叩清都紫府下逮黑壤黃泉咸被超升俱承惠澤見前清衆異口同音誦詠妙經稱揚睿號巳周十遍奉為齋主資薦魂儀往生仙界伏願委氣聚功登真悟道超度三界難徑上元始天所有太上真符謹當宣告宣符疏關送聖嘆經經者徑也指其徑路而歸焉學道修真濟生度死坦坦蕩蕩四通八達無礙無障以此徑路行之於精則能泝流入腦腦滿則能體強此深根無漏保命長生之法乃地仙行此徑路之妙也行之於神則內視返聽至虛靜一純白內備天光煥明乃神仙行此徑路之妙也行之於氣則能採盜大範之飛根呼吸虛皇之天氣出乾入坤結成無相之體號曰太一天尊乃天仙行此徑路之妙也行此徑路去情欲則斷生死之根去邪偽則登衆妙之門去萬物則超世表而出塵埃矣行此徑路於陽生之時斡轉璇璣以運符一息之中使金液灌頂銀浪衝開腦既巳滿則八功德水通鼻通口復咽歸黃庭以結中丹用之長久則髓滿骨堅百骸固密不知有寒暑衆痾之著人此地仙之應驗也行此徑路內視返聽守一真於上田黃房之內未嘗暫離雖隨機接物動用形體一意常溫溫於黃庭之中靜而常守動而常寂寂則明明則復歸於上田久久泰定則白光圎象煥爛一室人有來干我者我先知之此神仙之應驗也行此徑路服氣於清晨閉息於靜夜所謂服氣者服太和之精二景之英天氣入體百神自靈以神御氣氣乃長停既得其息積之又積積水成海積氣成神神凝胎結身內生身此天仙之應驗也行此徑路觀吾之心如太空焉觀吾之身如太無焉泛觀萬物悉皆幻化終歸殞滅無一物一事能動搖吾之心也吾之神常寂矣常寂則不知太虛之為我即我之為太虛耶此徑路之妙應焉是故行此徑路志怠功墮泯滅大道不成矣觀此徑路非世人修行不足以彰其妙世人非此徑路不足以驗其修行之功用也道者經之體經者道之用體用兩忘其道乃光夫如是則忘於所忘不忘其所忘也重説偈曰為仙為佛本殊途一揆同歸妙與俱識破這些關捩子無無無有有還無三聞經黃籙救苦十齋轉經儀
