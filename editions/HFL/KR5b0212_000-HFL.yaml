body:
  text: 祝香此香乾坤育質日月凝華抱生成之數於五行騰馥郁之馨於百和諸天稱慶萬聖臨軒𤑔向爐中供養至眞无上道寳玄都萬壽天尊以此𤑔香功德端爲上祝皇圖鞏固聖壽無疆欽願北極齊年南山等壽箕畢上符於王曆華夷永被於淳風此香天靈發頴月窟蟠根磅礴九霄可以返魂致魄周流八極得之起死回生𤑔向瀘中供養至眞无上經寳太一救苦天尊以此𤑔香功德超度齋壇所薦亡過某靈魂洎附薦衆魂盡脫重隂之府俱登長樂之鄉福被見存慶流後裔此香靈煙結乎五岳瑞炁蓊乎九垓爲道德香遍清靜境𤑔向爐中供養至眞无上師寳十方救苦天尊以此𤑔香功德㧞度三塗六趣十宫九幽沉迷利害之魂流浪死生之識哀哀長夜汨汨幽𡍼咸承三寳之惠光悉仗慈尊之願力脫離垢濁俱證清虚按人各恭信三歸依敷座讃伏以妙道難名洪恩普度德顯大慈之號位居東極之尊灑甘露而熱惱清涼散惠光而幽明洞照無所化而不化在處應身因以機而顯機利生接物定而善應慈以玄通一體同觀普天均被說經教化形於十方救苦魂超度於三界息七趣六情之痛楚停三塗九夜之辛酸委炁聚功享天堂之大福隨機赴感絶地獄之苦聲接引羣迷宏開衆妙提携庶𩔖俱入大乘以今奉爲齋主某資薦六過某靈魂修崇妙範恭啓蘭場科宣三洞之洪儀經轉十天之寳藴冀玄穹之垂鑑度魂爽以超昇俾亡過某諦聽眞詮頓脫離於苦趣躬承惠澤獲造跡於仙階旁及幽扄羈執之徒悉濟身後𡨚仇之衆俱沾曠蕩盡出輪廻兹請同盟之士各運入室之誠潔志澄心端身正念一依經法次第宣行入壇至東方跪奏具位誠惶誠恐稽首頓首再拜奏啓東方玉寳皇上天尊東郷救苦眞人童子无鞅眞衆恭望聖慈俯垂洞鑒伏以尊居震位有生咸頼於陶鎔春動陽和無物不資於造化金丹初轉木德敷榮敢祈吿命於靈司是用頒符於曲府匪慿洪造難格玄恩伏望緑輦丹轝來鑑十眞之㑹琅函寳笈周圎一遍之功臣干冒聖威下情無任懇祈之至法衆䖍誠謹伸奉請請聖散花宿命讃陞座演第一遍經伏聞香林苑内常宣救苦之經東極宫中廣運博施之德號大慈仁者稱救苦天尊應念垂慈㝷聲赴感發弘誓願救度衆生盡億劫以來廣度人无量以今陞座異口同音諷誦妙經稱揚睿號奉爲齋主資薦靈魂仗良因之妙力消億劫之愆瑕免歷東方考對之司徑詣清靜无極之國法衆䖍誠同聲諷誦經畢再至東方具位啓聖伏以應感分輝如滿十方之界㝷聲救苦願宏億劫之中仰冀垂慈敢忘皈命見前清衆異口同音諷詠妙經稱揚睿號巳周一遍奉爲齋主薦悼亡魂徃生仙界伏願假威神之妙力㧞罪苦之迷途出東方冥昧之郷登慧靜華林之境所有太上眞符謹當宣告宣符䟽關送聖南方跪奏具位誠惶誠恐稽首頓首再拜奏啓南方玄眞萬福天尊南郷救苦眞人童子无鞅眞衆恭望聖慈俯回洞鑑伏以德輝離位光明洞照於邇遐化闡南閻神造陶鎔於溟漠兩轉爐中之大藥再全地下之枯骸敢祈告命於靈司是用頒符於曲府匪慿洪造難格玄恩伏望緑輦丹舉來鑑十眞之㑹琅函寳笈周圎二遍之功臣于冒聖威下情無任懇禱之至法衆䖍誠謹伸奉請請聖散花陞座演第二遍經伏聞元始上帝昔在香林苑内宣告法解眞人讃嘆大慈仁者謂欲九幽亡殁超度必當一念注想稱揚願宏當時度品之功俯鑑此際皈依之志以今陞入經座異口同音諷詠妙經稱揚睿號奉爲齋主某資薦亡過某靈魂仗良因之妙力消億劫之愆尤免歷南方考對之司徑詣眞老無極之國法衆䖍誠同聲諷誦經畢再至南方具位啓聖伏以天炁歸身感自然之别體塵沙示現顯變化之殊因功德難量皈依至切見前清衆異口同音諷誦眞經稱揚睿號已周二遍奉爲齋主某薦授亡魂徃生仙界伏願承赫奕之靈光度魂儀於丹界不拘逼合永超南方冥昧之郷早證逍遥徑上端化莊嚴之境所有太上眞符謹當宣告宣符䟽關送聖西方跪奏具位誠惶誠恐稽首頓首再拜奏啓西方太妙至極天尊西郷救苦眞人童子无鞅眞衆恭望聖慈俯垂洞鑒伏以兊澤潜流金天乘運說兹萬法恊和覆載之機應彼四時啓廸生成之化羣生蒙惠三遍說經敢祈吿命於靈司是用頒符於曲府匪慿洪造難格玄恩伏望緑輦丹轝來鑑十眞之㑹琅函寳笈周圎三遍之功臣干冒天威下情無任懇禱之至法衆䖍誠謹伸奉請請聖散花陞座演第三遍伏聞救苦眞詮功遍覃於九地慈尊寳號恩普及於十方㧞領無邊讃揚莫盡以今陞入經座異口同音諷誦眞經稱揚睿號奉爲齋主資薦靈魂徃生仙界仗良因之妙力消億劫之愆瑕免歷西方考對之司徑詣法寳无極之國法衆䖍誠同聲諷誦經畢再至西方具位啓聖伏以㧞領无邊散祥煙而塞死戸超度三界擁慶雲而開生門仰聖化之巍巍罄丹誠之切切見前清衆異口同音諷詠眞經稱揚睿號巳周三遍奉爲齋主薦悼亡魂往生仙界伏願天光下燭惠澤滂沾出離西方㝠昧之郷升舉利益莊嚴之國所有太上眞符謹當宣吿宣符䟽關送聖北方跪奏具位誠惶誠恐稽首頓首再拜奏啓北方玄上玉晨天尊北郷救苦眞人童子元鞅眞衆恭望聖慈俯回洞鑑伏以啓至隂而肇運習盛德於坎宫萬物得以歸休羣生資而靜息說經四遍敷澤羣黎敢祈吿命於靈司是用頒符於曲府匪慿洪造難格玄恩伏望緑輦丹轝來鑑十眞之㑹琅函寳笈周圎四遍之功臣干冐聖威下情無任懇禱之至法衆䖍誠謹伸奉請請聖散花陞座演第四遍伏聞大洞妙經普救無邊之苦衆青玄上帝常垂不倦之慈悲恩被羣生願弘浩劫以今陞入經座異口同音諷誦妙經稱揚睿號奉爲齋主資薦亡魂仗良因之妙力消億劫之愆瑕免歷北方考對之司徑詣救苦無極之國法衆䖍誠同聲諷誦經畢再詣北方具位啓聖伏以體皆虚空資混元而成立炁能委順備萬物以光明凡有皈投必垂開度見前清衆異口同音誦詠妙經稱揚睿號已周四遍奉爲齋主資悼魂儀往生仙界伏願滅身心口業生智惠光明悉超北方冥昧之郷徑上定眞快樂之境所有太上眞符謹當宣吿宣符䟽關送聖東北方跪奏具位誠惶誠恐稽首頓首再拜奏啓東北方度仙上聖天尊東北郷救苦眞人童子无鞅眞衆恭望聖慈俯垂洞鑑伏以大象胚腪凝一炁以舍韞重玄化作分八索以恢張乾道流行艮山列位欲羣生而蒙福兹五遍以說經敢祈吿命於靈司是用頒符於曲府匪慿洪造難格玄恩伏望緑輦丹轝來鑑十眞之㑹琅函寳笈周圎五遍之功臣干冒聖威下情無任懇禱之至法衆䖍誠謹仲奉請請聖散花陞座演第五遍伏聞太一慈尊端拱青玄之左府洞玄妙藴普救黒壤之沉魂几有歸崇必蒙濟度以今陞入經座異口同音誦詠妙經稱揚睿號奏爲齋主資薦亡魂仗良因之妙力消億劫之愆瑕免歷東北方考對之司徑詣妙因无極之國法衆䖍誠同聲諷誦經畢再詣東北方具位啓聖伏以渺渺仙源肇布一元之炁巍巍大範旁昭三洞之文特伸忱悃之私願賜慈悲之澤見前清衆異口同音誦詠妙經稱揚睿號巳周五遍奉爲齋主薦悼魂儀往生仙界伏願罪消黒簿名注丹書出東北方冥昧之郷登長樂界蒼元之境所有太上眞符謹當宣吿宣符䟽關送聖東南方跪奏具位誠惶誠恐稽首頓首再拜奏啓東南方好生度命天尊東南郷救苦眞人童子无鞅眞衆恭望聖慈俯垂洞鑒伏以丹華闕下凝梵炁以爲宫絳府庭中揚巽風而煦物百谷識朝中之所三山標靈化之竒浸德澤以無涯配眞功而不宰說經六遍布化羣黎敢祈吿命於靈司是用頒符於曲府匪憑洪造難格玄恩伏望緑輦丹轝來鑑十眞之㑹琅函寳笈周圎六遍之功臣干冒聖威下情無任懇禱之至法衆䖍誠謹伸奉請請聖散花陞座演第六遍伏聞巍巍大範仰束極之慈悲蕩蕩自然賴洞玄之靈藴莫窮稱讃惟切皈依以今陞入經座異口同音誦詠妙經稱揚睿號奉爲齋主資薦靈魂仗良因之妙力消億劫之愆瑕免歷東南方考對之司徑詣眞安無極之國法衆䖍誠同聲諷誦經畢再詣東南方具位啓聖伏以紫雲宻覆是名三寳之神尊梵炁彌羅以制九天之魂爽玄功莫測丹悃必從見前清衆異口同音誦詠妙經稱揚睿號巳周六遍奉爲齋主資薦魂儀往生仙界伏願形神俱妙魂魄超升出東南方冥昧之郷登妙寂界莊嚴之國所有太上眞符謹當宣吿宣符䟽關送聖西南方跪奏具位誠惶誠恐稽首頓首再拜奏啓西南方太靈虚皇天尊西南郷救苦眞人童子无鞅眞衆恭望聖慈俯垂洞鑒伏以二象分靈紐沉機於分野重隂定位凝至靜於坤輿載物稱雄承天立極經巳周於七遍澤廣被於羣生敢祈吿命於靈司是用頒符於曲府匪慿洪造難格玄恩伏望緑輦丹轝来鑒十眞之㑹琅函寳笈周圎七遍之切臣干冐聖威下情無任懇禱之至法衆䖍誠謹伸奉請請聖散花陞座演第七遍伏聞空中灼灼仰承大道之恩幽境冥冥實著慈悲之惠苦輪普救仙境俱登以今陞入經座異口同音誦詠妙經稱揚睿號奉爲齋主資薦靈魂往生仙界仗良因之妙力消億劫之愆瑕免歷西南方考對之司徑詣耀眞无極之國法衆䖍誠同聲諷誦經畢再詣西南方具位啓聖伏以靈篇朗誦獲心垢以俱清睿號稱揚舉耳根之益淨旣無文而不度必有感以皆通見前清衆異口同音誦詠妙經巳周七遍奉爲齋主資薦亡魂往生仙界伏願罪根蕩滌神識清涼出西南方冥昧之郷登妙樂境莊嚴之國所有太上眞符謹當宣吿宣符䟽關送聖西北方跪奏具位誠惶誠恐稽首頓首再拜奏啓西北方無量太華天尊西北郷救苦眞人童子无鞅眞衆恭望聖慈俯垂洞鑒伏以混元踈朗廓玄象以傾光梵炁沖融鼓清風而立極均分寒暑主宰隂陽旣司善惡之權須酌重輕之報說經八遍普澤羣生敢祈吿命於靈司是用頒符於曲府匪慿洪造難格玄恩伏望緑輦丹轝來鑒十眞之㑹琅函寳笈周圎八遍之功臣干冒聖威下情無任懇禱之至法衆䖍誠謹伸奉請請聖散花陞座演第八遍伏聞大道恩深宣眞經而救苦幽途幸甚聞聖號以昇遷志篤心崇力祈濟度以今陞入經座異口同音誦詠妙經稱揚睿號奉爲齋主資薦亡魂仗良因之妙力消億劫之愆瑕免歷西北方考對之司徑詣濟苦無極之國法衆䖍誠同聲諷誦經畢再詣西北方具位啓聖伏以罪實可哀䝉道恩而濟度念無休息頼經法以生成旣伸皈向之誠必沐超凌之澤見前清衆異口同音誦詠妙經已周八遍奉爲濟主資薦亡魂往生仙界伏願蠲消宿業澄正魂神出西北冥昧之鄉登惠靜莊嚴之國所有太上眞符謹當宣告宣符䟽關送聖上方跪奏具位誠惶誠恐稽首頓首再拜奏啓上方玉虚明皇天尊上郷救苦眞人童子无鞅眞衆恭望聖慈俯垂洞鑒伏以虚无妙境蕆大範之玄功碧落清風扇自然之洪運眞功渺邈惠智難窮包括穹窿司張象緯既說經於九遍當普救於羣黎敢祈吿命於靈司是用頒符於曲府匪慿洪造難格玄恩伏望緑輦丹轝來鑒十眞之㑹琅函寳笈周圎九遍之功臣干冒聖威下情無任懇禱之至法衆䖍誠謹伸奉請請聖散花陞座演第九遍伏聞眞詮流布示法炬於昏衢寳號稱揚運慈航於苦海人天普濟正道咸歸以今陞入經座異口同音誦詠妙經稱揚睿號奉爲齋主資薦亡魂仗良因之妙力消億劫之愆瑕免歷上方考對之司徑詣七寳紫霄之國法衆䖍誠同聾諷誦經畢再詣上方具位啓聖伏以無名無我惟接引於羣生不迷不荒可悟成於眞道萬劫莫測於微妙寸誠克遂於感通見前清衆異口同音誦詠妙經稱揚睿號巳周九遍奉爲齋主資薦魂儀往生仙界伏願火翳成清署劒樹化爲騫魂爽下離於幽都神識上升於碧落所有太上眞符謹當宣吿宣符䟽關送聖下方跪奏具位誠惶誠恐稽首頓首再拜奏啓下方眞皇洞神天尊下郷救苦眞人童子无鞅眞衆恭望聖慈俯垂洞鑒伏以方輿載物弘大信以無私厚德安貞布洪基而永固咸資道力克運神功說經普救於九泉聽法巳周於十遍皆承功而受度今入聖以超凡敢祈吿命於靈司是用頒符於曲府匪慿洪造難格玄恩伏望緑輦丹轝來鑒十眞之㑹琅函寳笈周圎十遍之功臣干冒聖威下情無任懇禱之至法衆䖍誠謹伸奉請請聖散花陞座演第十遍伏聞東極慈父青玄老君沛法兩以潤衆生布慈雲而覆羣品恩沾九地澤被十方以今陞入經座異口同音誦詠妙經稱揚睿號奉爲齋主資薦亡魂仗良因之妙力消億劫之愆瑕免歷下方考對之司徑詣淨土莊嚴之國法衆䖍誠同聲諷誦經畢再詣下方具位啓聖伏以至眞蕆教道力遍周妙哉三洞之經至矣威神之力上叩清都紫府下逮黒壤黃泉咸被超升俱承惠澤見前清衆異口同音誦詠妙經稱揚睿號巳周十遍奉爲齋主資薦魂儀往生仙界伏願委炁聚功登眞悟道超度三界難徑上元始天所有太上眞符謹當宣吿宣符䟽關送聖嘆經經者徑也指其徑路而歸焉學道修眞濟生度死坦坦蕩蕩四通八達無礙無障以此徑路行之於精則能泝流入腦腦滿則能體强此深根無漏保命長生之法乃地仙行此徑路之妙也行之於神則内視返聽至虚靜一純白内備天光煥明乃神仙行此徑路之妙也行之於炁則能採盜大範之飛根呼吸虚皇之天炁出乾入坤結成無相之體號曰太一天尊乃天仙行此徑路之妙也行此徑路去情慾則斷生死之根去邪僞則登衆妙之門去萬物則超世表而出塵埃矣行此徑路於陽生之時斡轉璇璣以運符一息之中使金液灌頂銀浪衝開腦旣巳滿則八功德水通鼻通口復咽歸黃庭以結中丹用之長久則髓滿骨堅百骸固宻不知有寒暑衆痾之著人此地仙之應驗也行此徑路内視返聽守一眞於上田黃房之内未甞暫離雖隨機接物動用形體一意常温温於黃庭之中靜而常守動而常寂寂則明明則復歸於上田久久泰定則白光圎象煥爛一室人有來干我者我先知之此神仙之應驗也行此徑路服炁於清晨閉息於靜夜所謂服炁者服太和之精二景之英天炁入體百神自靈以神御炁炁乃長停旣得其息積之又積積水成海積炁成神神凝胎結身内生身此天仙之應驗也行此徑路觀吾之心如太空焉觀吾之身如太無焉泛觀萬物悉皆幻化終歸殞滅無一物一事能動揺吾之心也吾之神常寂矣常寂則不知太虚之爲我即我之爲太虚耶此徑路之妙應焉是故行此徑路志怠功墮泯㓕大道不成矣觀此徑路非世人修行不足以彰其妙世人非此徑路不足以驗其修行之功用也道者經之體經者道之用體用兩忘其道乃光夫如是則忘於所忘不忘其所忘也重說偈曰爲仙爲佛本殊途一揆同歸妙與倶識破這些關捩子無無無有有還無三聞經黃籙救苦十齋轉經儀
